databases:
  - name: pura-db
    plan: free
    databaseName: pura_call_center
    user: pura

services:
  - type: web
    name: pura-call-center
    plan: free
    runtime: node
    buildCommand: pnpm install && pnpm run build && pnpm drizzle-kit generate && pnpm drizzle-kit migrate
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pura-db
          property: connectionString
